<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ramel HR — Notifications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet"/>
  <style>
    /* ── TOKENS ── */
    :root {
      --orange:#E8451A; --orange-h:#c93c16; --orange-l:rgba(232,69,26,.1);
      --navy:#1B2A4A; --navy-l:#243355;
      --bg:#F5F5F5; --bg-card:#fff; --bg-muted:#F9F9F9;
      --border:#E5E7EB;
      --txt:#1A1A2E; --txt-s:#6B7280; --txt-m:#6B7280;
      --r-sm:6px; --r-md:10px; --r-lg:16px; --r-xl:24px; --r-pill:50px;
      --sh-card:0 2px 12px rgba(0,0,0,.06);
      --sidebar-w:220px; --topbar-h:60px;
    }
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:'DM Sans','Segoe UI',sans-serif;font-size:14px;background:var(--bg);color:var(--txt);margin:0;-webkit-font-smoothing:antialiased;}
    a{color:var(--orange);text-decoration:none}
    p,h1,h2,h3{margin:0}

    /* ── LAYOUT ── */
    .app-wrapper{display:flex;min-height:100vh}

    /* ── SIDEBAR ── */
    .app-sidebar{
      width:var(--sidebar-w);background:#fff;border-right:1px solid var(--border);
      display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;
      z-index:1000;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .25s ease;
    }
    .sidebar-logo{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;}
    .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#E8451A,#c93c16);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0;}
    .logo-name{font-size:16px;font-weight:800;color:#E8451A;letter-spacing:.5px;line-height:1;}
    .logo-sub{font-size:9px;color:#1B2A4A;font-weight:500;margin-top:1px;line-height:1;}
    .sidebar-menu-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-m);padding:20px 20px 8px;margin:0;}
    .sidebar-nav{list-style:none;padding:8px 0;margin:0;flex:1;}
    .sidebar-nav li a{
      display:flex;align-items:center;gap:10px;padding:10px 20px;
      color:var(--txt-s);font-size:14px;font-weight:500;text-decoration:none;
      position:relative;transition:background .15s,color .15s;
    }
    .sidebar-nav li a:hover{background:var(--orange-l);color:var(--orange);}
    .sidebar-nav li.active>a{color:var(--orange);background:var(--orange-l);font-weight:600;}
    .sidebar-nav li.active>a::before{content:'';position:absolute;left:0;top:0;height:100%;width:3px;background:var(--orange);border-radius:0 3px 3px 0;}
    .sidebar-footer{padding:16px 20px;font-size:11px;color:var(--txt-m);border-top:1px solid var(--border);}

    /* ── MAIN ── */
    .app-main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}

    /* ── TOPBAR ── */
    .app-topbar{
      height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:flex-end;
      padding:0 28px;gap:12px;position:sticky;top:0;z-index:100;
      box-shadow:0 1px 3px rgba(0,0,0,.06);
    }
    .topbar-action-btn{
      display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
      border:1px solid var(--border);border-radius:var(--r-sm);background:#fff;
      font-size:13px;font-weight:500;color:var(--txt-s);cursor:pointer;
      transition:border-color .15s,color .15s;font-family:inherit;
    }
    .topbar-action-btn:hover{border-color:var(--orange);color:var(--orange);}
    .topbar-divider{width:1px;height:24px;background:var(--border);}
    .topbar-icon-btn{
      width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
      background:transparent;display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:var(--txt-s);font-size:16px;transition:background .15s,color .15s;
      position:relative;
    }
    .topbar-icon-btn:hover{background:var(--orange-l);color:var(--orange);border-color:var(--orange);}
    .notif-badge{
      position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;
      background:var(--orange);color:#fff;font-size:9px;font-weight:700;
      display:flex;align-items:center;justify-content:center;border:2px solid #fff;
    }
    .topbar-user{display:flex;align-items:center;gap:8px;cursor:pointer;}
    .topbar-avatar{width:34px;height:34px;border-radius:50%;background:#374B6E;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
    .username{font-size:14px;font-weight:600;color:var(--txt);}

    /* Mobile */
    .sidebar-toggle{display:none;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;align-items:center;justify-content:center;color:var(--txt-s);font-size:20px;margin-right:auto;}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;}
    .sidebar-overlay.show{display:block;}

    /* ── PAGE CONTENT ── */
    .page-content{padding:24px 28px;flex:1;}
    .page-title{font-size:28px;font-weight:700;color:var(--txt);}
    .breadcrumb-ramel{font-size:12px;color:var(--txt-m);margin-top:2px;}
    .breadcrumb-ramel span{color:var(--txt-s);}

    /* ── NOTIFICATION CARD ── */
    .notif-card{background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh-card);border:1px solid var(--border);overflow:hidden;}

    /* ── CARD HEADER ── */
    .card-header-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px;
    }
    .card-title{font-size:16px;font-weight:700;color:var(--txt);}
    .unread-count{
      display:inline-flex;align-items:center;gap:6px;
      font-size:13px;color:var(--txt-s);
    }
    .unread-pill{
      background:var(--orange);color:#fff;font-size:11px;font-weight:700;
      padding:2px 8px;border-radius:var(--r-pill);
    }
    .btn-mark-all{
      background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);
      padding:7px 14px;font-size:13px;font-weight:500;color:var(--txt-s);
      cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s;
      display:inline-flex;align-items:center;gap:6px;
    }
    .btn-mark-all:hover{border-color:var(--orange);color:var(--orange);}

    /* ── FILTER TABS ── */
    .filter-tabs{
      display:flex;align-items:center;gap:0;padding:0 24px;
      border-bottom:1px solid var(--border);overflow-x:auto;
    }
    .filter-tab{
      padding:14px 18px;font-size:13px;font-weight:500;color:var(--txt-s);
      cursor:pointer;border-bottom:2.5px solid transparent;
      white-space:nowrap;transition:color .15s,border-color .15s;
      background:none;border-top:none;border-left:none;border-right:none;
      font-family:inherit;
    }
    .filter-tab:hover{color:var(--orange);}
    .filter-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;}
    .tab-count{
      display:inline-flex;align-items:center;justify-content:center;
      background:var(--orange-l);color:var(--orange);font-size:11px;font-weight:700;
      padding:1px 7px;border-radius:var(--r-pill);margin-left:5px;
    }
    .filter-tab.active .tab-count{background:var(--orange);color:#fff;}

    /* ── NOTIFICATION ITEMS ── */
    .notif-group-label{
      font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
      color:var(--txt-m);padding:14px 24px 6px;background:var(--bg-muted);
      border-bottom:1px solid var(--border);
    }

    .notif-item{
      display:flex;align-items:flex-start;gap:16px;
      padding:16px 24px;border-bottom:1px solid #F3F4F6;
      position:relative;cursor:pointer;transition:background .1s;
    }
    .notif-item:last-child{border-bottom:none;}
    .notif-item:hover{background:#FAFAFA;}
    .notif-item.unread{background:#FFF8F5;}
    .notif-item.unread:hover{background:#FFF3EE;}

    /* Unread dot */
    .unread-dot{
      position:absolute;top:20px;right:20px;
      width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0;
    }

    /* Avatar */
    .notif-av{
      width:44px;height:44px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;color:#fff;flex-shrink:0;
    }

    /* Icon-only avatar for system notifs */
    .notif-av.icon-av{
      background:var(--orange-l);color:var(--orange);font-size:18px;
    }

    .notif-body{flex:1;min-width:0;}
    .notif-title{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px;}
    .notif-item.unread .notif-title{font-weight:700;}
    .notif-desc{font-size:13px;color:var(--txt-s);line-height:1.5;margin-bottom:6px;}
    .notif-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .notif-time-lbl{font-size:12px;color:var(--txt-m);display:flex;align-items:center;gap:4px;}
    .notif-tag{
      font-size:11px;font-weight:600;padding:2px 10px;border-radius:var(--r-pill);
    }
    .tag-leave{background:#DCFCE7;color:#16A34A;}
    .tag-attendance{background:#DBEAFE;color:#1D4ED8;}
    .tag-payroll{background:#FEF9C3;color:#A16207;}
    .tag-policy{background:#F3E8FF;color:#7C3AED;}
    .tag-system{background:#F1F5F9;color:#475569;}
    .tag-birthday{background:#FFE4E6;color:#BE123C;}

    /* Action buttons on hover */
    .notif-actions{
      display:flex;align-items:center;gap:6px;flex-shrink:0;
      opacity:0;transition:opacity .15s;
    }
    .notif-item:hover .notif-actions{opacity:1;}
    .btn-notif-action{
      width:30px;height:30px;border-radius:50%;border:1px solid var(--border);
      background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:var(--txt-s);font-size:13px;transition:border-color .15s,color .15s,background .15s;
    }
    .btn-notif-action:hover{border-color:var(--orange);color:var(--orange);}
    .btn-notif-action.del:hover{border-color:#EF4444;color:#EF4444;}

    /* ── EMPTY STATE ── */
    .empty-state{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      padding:64px 24px;text-align:center;
    }
    .empty-state.show{display:flex;}
    .empty-icon{font-size:48px;color:#D1D5DB;margin-bottom:16px;}
    .empty-title{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:6px;}
    .empty-sub{font-size:13px;color:var(--txt-s);}

    /* ── RESPONSIVE ── */
    @media(max-width:991.98px){
      .sidebar-toggle{display:flex;}
      .app-sidebar{transform:translateX(-100%);}
      .app-sidebar.open{transform:translateX(0);}
      .app-main{margin-left:0;}
      .topbar-action-btn span{display:none;}
    }
    @media(max-width:767.98px){
      .page-content{padding:16px;}
      .card-header-row{padding:14px 16px;}
      .filter-tabs{padding:0 16px;}
      .notif-item{padding:14px 16px;}
      .notif-group-label{padding:12px 16px 4px;}
      .notif-actions{opacity:1;}
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="app-sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/images/logo.png" width="120px" alt="Ramel Logo">
    </div>

    <p class="sidebar-menu-label">Main Menu</p>

    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
      <li><a href="leave-requests.html"><i class="fas fa-calendar-check"></i> Leave Requests</a></li>
      <li><a href="#"><i class="fas fa-calendar-days"></i> Calendar</a></li>
      <li class="active"><a href="notification.html"><i class="fas fa-bell"></i> Notification</a></li>
      <li><a href="settings.html"><i class="fas fa-gear"></i> Settings</a></li>
    </ul>

    <p class="sidebar-footer">Copyrights 2025 | Ramel Techno Sol</p>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ══════════ MAIN ══════════ -->
  <div class="app-main">

    <!-- TOPBAR -->
    <header class="app-topbar">
      <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>

      <button class="topbar-action-btn">
        <i class="fas fa-arrow-up-from-bracket"></i> <span>Export</span>
        <i class="fas fa-chevron-down" style="font-size:10px"></i>
      </button>
      <button class="topbar-action-btn">
        <i class="fas fa-calendar-days"></i> <span>Calendar</span>
      </button>

      <div class="topbar-divider"></div>

      <button class="topbar-icon-btn" style="background:var(--orange-l);color:var(--orange);border-color:var(--orange);">
        <i class="fas fa-bell"></i>
        <span class="notif-badge" id="topbarBadge">5</span>
      </button>

      <div class="topbar-user">
        <div class="topbar-avatar">G</div>
        <span class="username">Gokul</span>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="page-content">

      <!-- Header -->
      <div class="d-flex align-items-start justify-content-between mb-4">
        <div>
          <h1 class="page-title">Notifications</h1>
          <p class="breadcrumb-ramel">/ Dashboard / <span>Notifications</span></p>
        </div>
      </div>

      <!-- Main card -->
      <div class="notif-card">

        <!-- Card header -->
        <div class="card-header-row">
          <div class="d-flex align-items-center gap-3">
            <span class="card-title">All Notifications</span>
            <span class="unread-count">
              <span class="unread-pill" id="unreadPill">5 unread</span>
            </span>
          </div>
          <button class="btn-mark-all" onclick="markAllRead()">
            <i class="fas fa-check-double"></i> Mark all as read
          </button>
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setTab('all', this)">
            All <span class="tab-count" id="cnt-all">12</span>
          </button>
          <button class="filter-tab" onclick="setTab('unread', this)">
            Unread <span class="tab-count" id="cnt-unread">5</span>
          </button>
          <button class="filter-tab" onclick="setTab('leave', this)">
            Leave <span class="tab-count" id="cnt-leave">4</span>
          </button>
          <button class="filter-tab" onclick="setTab('attendance', this)">
            Attendance <span class="tab-count" id="cnt-attendance">2</span>
          </button>
          <button class="filter-tab" onclick="setTab('payroll', this)">
            Payroll <span class="tab-count" id="cnt-payroll">2</span>
          </button>
          <button class="filter-tab" onclick="setTab('system', this)">
            System <span class="tab-count" id="cnt-system">4</span>
          </button>
        </div>

        <!-- Notification list -->
        <div id="notifList"></div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon"><i class="fas fa-bell-slash"></i></div>
          <p class="empty-title">No notifications here</p>
          <p class="empty-sub">You're all caught up! Check back later.</p>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  /* ── DATA ── */
  let notifications = [
    /* TODAY */
    {
      id:1, group:'Today', category:'leave', unread:true,
      initials:'MG', color:'#E8451A',
      title:'Leave Request Approved',
      desc:'Your leave request for 24th April 2025 (Sick Leave) has been approved by your manager.',
      time:'Today at 9:42 AM', tag:'leave', tagLabel:'Leave'
    },
    {
      id:2, group:'Today', category:'attendance', unread:true,
      initials:'SY', color:'#6366F1',
      title:'Late Check-In Alert',
      desc:'You checked in at 10:32 AM today. Standard check-in time is 9:30 AM. Please ensure punctuality.',
      time:'Today at 10:33 AM', tag:'attendance', tagLabel:'Attendance'
    },
    {
      id:3, group:'Today', category:'system', unread:true,
      icon:'fas fa-cake-candles', iconColor:'#BE123C', iconBg:'#FFE4E6',
      title:"It's Nandha Krishnan's Birthday! 🎂",
      desc:'Today is Nandha Krishnan\'s birthday. Send your wishes and make their day special!',
      time:'Today at 8:00 AM', tag:'birthday', tagLabel:'Birthday'
    },
    {
      id:4, group:'Today', category:'payroll', unread:false,
      icon:'fas fa-file-lines', iconColor:'#A16207', iconBg:'#FEF9C3',
      title:'Payslip for March 2025 Available',
      desc:'Your payslip for the month of March 2025 has been generated and is available for download.',
      time:'Today at 7:00 AM', tag:'payroll', tagLabel:'Payroll'
    },
    /* YESTERDAY */
    {
      id:5, group:'Yesterday', category:'leave', unread:true,
      initials:'MG', color:'#22C55E',
      title:'Leave Request Submitted',
      desc:'Your leave request for 30th April 2025 (Casual Leave — 1 day) has been submitted and is pending approval.',
      time:'Yesterday at 4:15 PM', tag:'leave', tagLabel:'Leave'
    },
    {
      id:6, group:'Yesterday', category:'attendance', unread:false,
      icon:'fas fa-clock-rotate-left', iconColor:'#1D4ED8', iconBg:'#DBEAFE',
      title:'Attendance Regularisation Approved',
      desc:'Your attendance regularisation request for 10th April has been approved by HR.',
      time:'Yesterday at 3:00 PM', tag:'attendance', tagLabel:'Attendance'
    },
    {
      id:7, group:'Yesterday', category:'leave', unread:true,
      initials:'HR', color:'#F59E0B',
      title:'Leave Balance Updated',
      desc:'Your leave balance has been updated for the new quarter. Total available: Sick Leave 6 days, Casual Leave 4 days.',
      time:'Yesterday at 10:00 AM', tag:'leave', tagLabel:'Leave'
    },
    {
      id:8, group:'Yesterday', category:'system', unread:false,
      icon:'fas fa-file-shield', iconColor:'#7C3AED', iconBg:'#F3E8FF',
      title:'Leave Policy Updated',
      desc:'The company leave policy has been updated effective 1st May 2025. Please review the new policy document.',
      time:'Yesterday at 9:00 AM', tag:'policy', tagLabel:'Policy'
    },
    /* EARLIER THIS WEEK */
    {
      id:9, group:'Earlier this week', category:'payroll', unread:false,
      icon:'fas fa-indian-rupee-sign', iconColor:'#A16207', iconBg:'#FEF9C3',
      title:'Salary Credited for March 2025',
      desc:'Your salary for March 2025 has been credited to your registered bank account ending in **4521.',
      time:'Mon at 9:30 AM', tag:'payroll', tagLabel:'Payroll'
    },
    {
      id:10, group:'Earlier this week', category:'leave', unread:false,
      initials:'MG', color:'#EF4444',
      title:'Leave Request Rejected',
      desc:'Your leave request for 18th April 2025 (Earned Leave) was not approved. Reason: Project deadline.',
      time:'Mon at 11:00 AM', tag:'leave', tagLabel:'Leave'
    },
    {
      id:11, group:'Earlier this week', category:'system', unread:false,
      icon:'fas fa-gear', iconColor:'#475569', iconBg:'#F1F5F9',
      title:'System Maintenance Scheduled',
      desc:'The HR portal will be under maintenance on Saturday 26th April from 11 PM to 2 AM. Please save your work.',
      time:'Sun at 6:00 PM', tag:'system', tagLabel:'System'
    },
    {
      id:12, group:'Earlier this week', category:'system', unread:false,
      icon:'bi-shield-check', iconColor:'#16A34A', iconBg:'#DCFCE7',
      title:'Profile Verification Complete',
      desc:'Your employee profile documents have been verified successfully by the HR team.',
      time:'Sun at 2:00 PM', tag:'system', tagLabel:'System'
    },
  ];

  /* ── STATE ── */
  let activeTab = 'all';

  /* ── RENDER ── */
  function render() {
    const list = document.getElementById('notifList');
    const empty = document.getElementById('emptyState');

    let data = [...notifications];
    if (activeTab === 'unread') data = data.filter(n => n.unread);
    else if (activeTab !== 'all')  data = data.filter(n => n.category === activeTab);

    if (data.length === 0) {
      list.innerHTML = '';
      empty.classList.add('show');
      return;
    }
    empty.classList.remove('show');

    /* Group by day */
    const groups = {};
    data.forEach(n => {
      if (!groups[n.group]) groups[n.group] = [];
      groups[n.group].push(n);
    });

    list.innerHTML = Object.entries(groups).map(([g, items]) => `
      <div class="notif-group-label">${g}</div>
      ${items.map(n => renderItem(n)).join('')}
    `).join('');

    updateCounts();
    updateBadge();
  }

  function renderItem(n) {
    const tagMap = {
      leave:'tag-leave', attendance:'tag-attendance', payroll:'tag-payroll',
      policy:'tag-policy', system:'tag-system', birthday:'tag-birthday'
    };

    const avatar = n.initials
      ? `<div class="notif-av" style="background:${n.color};">${n.initials}</div>`
      : `<div class="notif-av icon-av" style="background:${n.iconBg};color:${n.iconColor};font-size:20px;">
           <i class="${n.icon}"></i>
         </div>`;

    return `
      <div class="notif-item ${n.unread ? 'unread' : ''}" id="ni-${n.id}" onclick="markRead(${n.id})">
        ${avatar}
        <div class="notif-body">
          <p class="notif-title">${n.title}</p>
          <p class="notif-desc">${n.desc}</p>
          <div class="notif-meta">
            <span class="notif-time-lbl">
              <i class="fas fa-clock" style="font-size:11px;"></i> ${n.time}
            </span>
            <span class="notif-tag ${tagMap[n.tag] || 'tag-system'}">${n.tagLabel}</span>
          </div>
        </div>
        <div class="notif-actions" onclick="event.stopPropagation()">
          <button class="btn-notif-action" title="Mark as read" onclick="markRead(${n.id})">
            <i class="fas fa-check"></i>
          </button>
          <button class="btn-notif-action del" title="Dismiss" onclick="dismiss(${n.id})">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
        ${n.unread ? '<span class="unread-dot"></span>' : ''}
      </div>`;
  }

  /* ── ACTIONS ── */
  function markRead(id) {
    const n = notifications.find(x => x.id === id);
    if (n) { n.unread = false; render(); }
  }

  function dismiss(id) {
    notifications = notifications.filter(x => x.id !== id);
    render();
  }

  function markAllRead() {
    notifications.forEach(n => n.unread = false);
    render();
  }

  function setTab(tab, btn) {
    activeTab = tab;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  /* ── COUNTS ── */
  function updateCounts() {
    const unread  = notifications.filter(n => n.unread).length;
    const byType  = cat => notifications.filter(n => n.category === cat).length;

    document.getElementById('cnt-all').textContent       = notifications.length;
    document.getElementById('cnt-unread').textContent    = unread;
    document.getElementById('cnt-leave').textContent     = byType('leave');
    document.getElementById('cnt-attendance').textContent= byType('attendance');
    document.getElementById('cnt-payroll').textContent   = byType('payroll');
    document.getElementById('cnt-system').textContent    = byType('system');

    const pill = document.getElementById('unreadPill');
    pill.textContent = unread > 0 ? `${unread} unread` : 'All read';
    pill.style.background = unread > 0 ? 'var(--orange)' : '#22C55E';
  }

  function updateBadge() {
    const unread = notifications.filter(n => n.unread).length;
    const badge  = document.getElementById('topbarBadge');
    badge.textContent = unread;
    badge.style.display = unread > 0 ? 'flex' : 'none';
  }

  /* ── SIDEBAR TOGGLE ── */
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  });

  /* ── INIT ── */
  render();
</script>
</body>
</html>
